<!DOCTYPE html>
<html>
<head>
    <title>College Event Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
  <div class="container">
    
    <a class="navbar-brand" href="/">Event Management</a>

    <div class="ms-auto">
        {% if user.is_authenticated %}
            <a href="{% url 'profile' %}" class="btn btn-outline-light btn-sm me-2">
                Profile
            </a>

            <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">
                Logout
            </a>
        {% else %}
            <a href="{% url 'register' %}" class="btn btn-outline-light btn-sm me-2">
                Register
            </a>

            <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">
                Login
            </a>
        {% endif %}
    </div>

  </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
